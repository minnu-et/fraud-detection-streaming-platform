kafka:
  bootstrap_servers: "localhost:9092"
  topic: "transactions"
  max_retries: 3

spark:
  app_name: "FraudDetectionStreaming"
  shuffle_partitions: 2
  log_level: "WARN"

paths:
  base: "/home/minnu/Projects/fraud-detection-streaming-platform/data"
  delta:
    transactions: "delta/transactions"
    velocity_alerts: "delta/velocity_alerts"
    unified_alerts: "delta/unified_alerts"
  checkpoints:
    transactions: "checkpoints/transactions"
    velocity_alerts: "checkpoints/velocity_alerts"
    dlq: "checkpoints/dlq"
    unified_alerts: "checkpoints/unified_alerts"

fraud_rules:
  high_amount_threshold: 1000
  velocity_threshold: 5
  velocity_window: "5 minutes"
  velocity_watermark: "10 minutes"
  amount_spike_multiplier: 3.0
  geo_risk_countries:
    - "NG"
    - "RU"
    - "KP"
    - "IR"

generator:
  num_users: 100
  transaction_interval: 0.5
