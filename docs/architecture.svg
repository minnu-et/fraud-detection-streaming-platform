<svg width="100%" viewBox="0 0 780 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9c9a92" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#e05555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="780" height="560" fill="#0d0d0d"/>

  <text x="390" y="22" text-anchor="middle" font-size="10" letter-spacing="0.1em" fill="#c2c0b6" opacity="0.4" font-family="monospace">INGESTION</text>

  <!-- Transaction Generator -->
  <rect x="20" y="32" width="130" height="52" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
  <text x="85" y="54" text-anchor="middle" dominant-baseline="central" fill="#9fe1cb" font-size="13" font-weight="500" font-family="sans-serif">Transaction</text>
  <text x="85" y="70" text-anchor="middle" dominant-baseline="central" fill="#9fe1cb" font-size="13" font-weight="500" font-family="sans-serif">Generator</text>

  <line x1="150" y1="58" x2="178" y2="58" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Kafka -->
  <rect x="180" y="32" width="140" height="52" rx="8" fill="#3c3489" stroke="#afa9ec" stroke-width="0.5"/>
  <text x="250" y="50" text-anchor="middle" dominant-baseline="central" fill="#cecbf6" font-size="13" font-weight="500" font-family="sans-serif">Apache Kafka</text>
  <text x="250" y="66" text-anchor="middle" dominant-baseline="central" fill="#afa9ec" font-size="11" font-family="sans-serif">topic: transactions</text>
  <text x="250" y="80" text-anchor="middle" dominant-baseline="central" fill="#afa9ec" font-size="11" font-family="sans-serif">keyed by user_id</text>

  <line x1="320" y1="58" x2="348" y2="58" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Spark -->
  <rect x="350" y="32" width="160" height="52" rx="8" fill="#6b3500" stroke="#e8954a" stroke-width="0.5"/>
  <text x="430" y="50" text-anchor="middle" dominant-baseline="central" fill="#f5c99a" font-size="13" font-weight="500" font-family="sans-serif">Spark Structured</text>
  <text x="430" y="66" text-anchor="middle" dominant-baseline="central" fill="#f5c99a" font-size="13" font-weight="500" font-family="sans-serif">Streaming</text>
  <text x="430" y="80" text-anchor="middle" dominant-baseline="central" fill="#e8954a" font-size="11" font-family="sans-serif">readStream + from_json</text>

  <!-- DLQ arrow -->
  <line x1="510" y1="44" x2="558" y2="44" stroke="#e05555" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow-red)"/>
  <text x="533" y="38" text-anchor="middle" fill="#e05555" font-size="10" font-family="sans-serif">bad records</text>

  <!-- DLQ Box -->
  <rect x="560" y="26" width="120" height="52" rx="8" fill="#4a1a1a" stroke="#e05555" stroke-width="0.5"/>
  <text x="620" y="46" text-anchor="middle" dominant-baseline="central" fill="#f5a0a0" font-size="12" font-weight="500" font-family="sans-serif">Kafka DLQ</text>
  <text x="620" y="62" text-anchor="middle" dominant-baseline="central" fill="#e05555" font-size="11" font-family="sans-serif">transactions_dlq</text>

  <!-- Arrow down Spark to rules -->
  <line x1="430" y1="84" x2="430" y2="108" stroke="#9c9a92" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="445" y="100" fill="#9c9a92" font-size="10" font-family="sans-serif">good_df</text>

  <text x="390" y="126" text-anchor="middle" font-size="10" letter-spacing="0.1em" fill="#c2c0b6" opacity="0.4" font-family="monospace">FRAUD RULES ENGINE</text>
  <text x="230" y="132" text-anchor="middle" fill="#9c9a92" font-size="10" font-family="sans-serif">sequential column transforms →</text>
  <text x="580" y="132" text-anchor="middle" fill="#9c9a92" font-size="10" font-family="sans-serif">← branches (windowed agg)</text>

  <!-- Rules -->
  <rect x="20" y="138" width="130" height="48" rx="8" fill="#3c3489" stroke="#afa9ec" stroke-width="0.5"/>
  <text x="85" y="158" text-anchor="middle" dominant-baseline="central" fill="#cecbf6" font-size="12" font-weight="500" font-family="sans-serif">High Amount</text>
  <text x="85" y="174" text-anchor="middle" dominant-baseline="central" fill="#afa9ec" font-size="11" font-family="sans-serif">amount &gt; $1,000</text>

  <rect x="165" y="138" width="130" height="48" rx="8" fill="#3c3489" stroke="#afa9ec" stroke-width="0.5"/>
  <text x="230" y="158" text-anchor="middle" dominant-baseline="central" fill="#cecbf6" font-size="12" font-weight="500" font-family="sans-serif">Geo Anomaly</text>
  <text x="230" y="174" text-anchor="middle" dominant-baseline="central" fill="#afa9ec" font-size="11" font-family="sans-serif">NG, RU, KP, IR</text>

  <rect x="310" y="138" width="130" height="48" rx="8" fill="#3c3489" stroke="#afa9ec" stroke-width="0.5"/>
  <text x="375" y="158" text-anchor="middle" dominant-baseline="central" fill="#cecbf6" font-size="12" font-weight="500" font-family="sans-serif">Amount Spike</text>
  <text x="375" y="174" text-anchor="middle" dominant-baseline="central" fill="#afa9ec" font-size="11" font-family="sans-serif">3x user average</text>

  <rect x="510" y="138" width="130" height="48" rx="8" fill="#3c3489" stroke="#afa9ec" stroke-width="0.5" stroke-dasharray="4 2"/>
  <text x="575" y="158" text-anchor="middle" dominant-baseline="central" fill="#cecbf6" font-size="12" font-weight="500" font-family="sans-serif">Velocity Fraud</text>
  <text x="575" y="174" text-anchor="middle" dominant-baseline="central" fill="#afa9ec" font-size="11" font-family="sans-serif">&gt;5 txns / 5 min</text>

  <!-- Arrows rules to union -->
  <line x1="85" y1="186" x2="275" y2="250" stroke="#9c9a92" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="230" y1="186" x2="295" y2="250" stroke="#9c9a92" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="375" y1="186" x2="325" y2="250" stroke="#9c9a92" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="575" y1="186" x2="355" y2="250" stroke="#9c9a92" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>

  <!-- Velocity also writes directly to velocity_alerts -->
  <path d="M640 186 L640 345 L500 345 L500 368" fill="none" stroke="#9c9a92" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="655" y="290" text-anchor="middle" fill="#9c9a92" font-size="10" font-family="sans-serif" writing-mode="tb">also writes directly</text>

  <!-- Union box -->
  <rect x="220" y="252" width="210" height="44" rx="8" fill="#1a1a2e" stroke="#9c9a92" stroke-width="0.5"/>
  <text x="325" y="270" text-anchor="middle" dominant-baseline="central" fill="#c2c0b6" font-size="13" font-weight="500" font-family="sans-serif">union()</text>
  <text x="325" y="286" text-anchor="middle" dominant-baseline="central" fill="#9c9a92" font-size="11" font-family="sans-serif">normalize to unified schema</text>

  <!-- Delta Lake boundary -->
  <rect x="20" y="314" width="580" height="110" rx="10" fill="none" stroke="rgba(222,220,209,0.25)" stroke-width="0.5" stroke-dasharray="6 4"/>
  <text x="40" y="328" fill="#c2c0b6" font-size="10" opacity="0.4" font-family="monospace" letter-spacing="0.08em">DELTA LAKE — ACID · TIME TRAVEL · SCHEMA ENFORCEMENT</text>

  <!-- Arrows union to tables -->
  <line x1="255" y1="296" x2="115" y2="366" stroke="#9c9a92" stroke-width="1" marker-end="url(#arrow)"/>
  <path d="M325 296 L325 345 L115 345 L115 366" fill="none" stroke="#9c9a92" stroke-width="1" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
  <line x1="385" y1="296" x2="500" y2="366" stroke="#9c9a92" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Delta tables -->
  <rect x="30" y="368" width="160" height="44" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
  <text x="110" y="386" text-anchor="middle" dominant-baseline="central" fill="#9fe1cb" font-size="13" font-weight="500" font-family="sans-serif">transactions</text>
  <text x="110" y="402" text-anchor="middle" dominant-baseline="central" fill="#5dcaa5" font-size="11" font-family="sans-serif">all processed rows + flags</text>

  <rect x="240" y="368" width="160" height="44" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
  <text x="320" y="386" text-anchor="middle" dominant-baseline="central" fill="#9fe1cb" font-size="13" font-weight="500" font-family="sans-serif">velocity_alerts</text>
  <text x="320" y="402" text-anchor="middle" dominant-baseline="central" fill="#5dcaa5" font-size="11" font-family="sans-serif">windowed aggregations</text>

  <rect x="420" y="368" width="160" height="44" rx="8" fill="#085041" stroke="#5dcaa5" stroke-width="0.5"/>
  <text x="500" y="386" text-anchor="middle" dominant-baseline="central" fill="#9fe1cb" font-size="13" font-weight="500" font-family="sans-serif">unified_alerts</text>
  <text x="500" y="402" text-anchor="middle" dominant-baseline="central" fill="#5dcaa5" font-size="11" font-family="sans-serif">all rule alerts</text>

  <!-- Footer -->
  <text x="390" y="442" text-anchor="middle" opacity="0.35" fill="#c2c0b6" font-size="11" font-family="sans-serif">each of 4 streaming queries has its own checkpoint — restart-safe, no data loss</text>
  <text x="390" y="458" text-anchor="middle" opacity="0.35" fill="#c2c0b6" font-size="11" font-family="sans-serif">bad records routed to Kafka DLQ instead of being silently dropped</text>
  <text x="390" y="474" text-anchor="middle" opacity="0.35" fill="#c2c0b6" font-size="11" font-family="sans-serif">velocity rule branches separately — windowed agg changes schema, loses transaction_id</text>
</svg>
